<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>سایت ساده — روشن / تاریک</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">سلام — تم روشن و تاریک</h1>
    <button id="themeToggle" class="theme-toggle" aria-pressed="false" aria-label="تغییر تم">
      <span id="themeIcon">🌙</span>
    </button>
  </header>

  <main class="container">
    <section class="card">
      <h2>عنوان کارد</h2>
      <p>این یک صفحهٔ ساده است که دو تم روشن و تاریک دارد. رنگ‌های اصلی: نارنجي و سفيد.</p>
      <a class="btn" href="#">عمل اصلی</a>
    </section>

    <section class="panels">
      <div class="panel">
        <h3>نارنجی</h3>
        <p>از نارنجي برای برجسته‌سازی استفاده شده است.</p>
      </div>
      <div class="panel white-panel">
        <h3>سفید</h3>
        <p>سفید به عنوان رنگ پس‌زمینه/متن در برخی جاها استفاده می‌شود.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© 2025 — نمونه ساده</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
